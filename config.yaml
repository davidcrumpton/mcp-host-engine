---
Version: "1.0.0"
port: "8001"
host: "127.0.0.1"
use_https: false
bearer_token: ""
run_as_root: false
verbosity_level: 4
plugins:
  google_search:
    google_api_key: "abc123"
    google_cx_id: "cx456"
    allowed_domains: ["google.com"]
  http_request_get:
    allowed_domains:
      - "reddit.com"
      - "github.com"
      - "stackoverflow.com"
      - "medium.com"
      - "dev.to"
      - "news.ycombinator.com"
      - "gitlab.com"
    allowed_env_vars: []
    api_token: "xyz"
  wikipedia_search:
    allowed_domains: ["en.wikipedia.org"]
  memory:
    enabled: true
    allowed_write_file_paths: ["/tmp/mcphe/"]
    allowed_read_file_paths: ["/tmp/mcphe/"]
    allowed_http_headers:
      - "mcp-request-id"
      - "mcp-session-id"
    options:
      data_dir: "/tmp/mcphe"

  

