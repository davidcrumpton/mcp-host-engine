image: golang:1.25.4

stages:
  - build
  - test
  - release

build:
  stage: build
  script:
    - make build
  artifacts:
    paths:
      - mcphe

test:
  stage: test
  script:
    - make test
    - make plugin-tests

release:
  stage: release
  script:
    - make release
  artifacts:
    paths:
      - mcphe
  only:
    - tags